# CoCreator Configuration Example
# Copy this file to config.yaml and modify as needed

# VLM (Vision Language Model) Configuration
# Only base_url and api_key are required - supports any OpenAI-compatible API
vlm:
  # API endpoint (note: do NOT include /v1 suffix)
  base_url: "https://api.siliconflow.cn"

  # API key - use ${ENV_VAR} syntax to load from environment
  api_key: "${SILICONFLOW_API_KEY}"

  # Model name - check your provider's available models
  model: "Qwen/Qwen3.5-397B-A17B"

  # Request timeout in seconds
  timeout: 120.0

# Rate Limiting Configuration
rate_limit:
  # Requests per minute (RPM) - adjust based on your API tier
  rpm: 500

  # Tokens per minute (TPM) - adjust based on your API tier
  tpm: 2000000

  # Maximum concurrent requests
  concurrency: 20

# Pipeline Configuration
pipeline:
  # Path to action_info directory containing position vectors
  # Structure: {dataset_path}/{episode_id}/{frame_id}_next_frame_position_at_current_camera.txt
  dataset_path: "/data/ours_dataset/action_info"

  # Path to videos directory containing frame images
  # Structure: {videos_path}/{episode_id}/{frame_id}_CameraFpgaP0H120.jpg
  videos_path: "/data/ours_dataset/videos"

  # Output directory for events, chains, and dataset output
  output_dir: "./output"

  # Number of historical frames before event (inclusive) for VLM analysis
  history_frames: 7

  # Number of future frames after event for VLM confirmation
  future_frames: 11

  # Anomaly detection threshold (standard deviations above mean)
  # Higher = fewer events, Lower = more events
  anomaly_threshold: 2.0

  # Steering angle threshold (degrees)
  # Frames with direction change above this are flagged as steering events
  steering_threshold: 15.0

  # Minimum frame interval between distinct events
  min_event_interval: 5

  # Merge adjacent events within interval into a single event
  merge_adjacent_events: true

  # Maximum retry attempts for API calls
  retry_max_attempts: 3

  # Exponential backoff factor for retries
  retry_backoff_factor: 2.0